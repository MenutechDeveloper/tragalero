<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Web | Tragalero</title>
    <link rel="icon" type="image/png" href="https://tragalero.com/assets/img/tragalero.png">
    <link rel="shortcut icon" href="https://tragalero.com/assets/img/tragalero.png">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --success: #059669;
            --error: #dc2626;
            --dev: #8b5cf6;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; margin-bottom: 72px; }
        .logo-main { width: 100%; max-width: 280px; height: auto; margin: 0 auto 10px auto; display: block; filter: drop-shadow(0 10px 20px rgba(255,149,51,0.15)); }

        .dashboard-layout { display: flex; min-height: calc(100vh - 160px); gap: 40px; }

        .main-content { flex: 1; min-width: 0; }

        .component-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .component-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 700; }

        .drop-zone {
            width: 100%; height: 200px; border-radius: 36px; border: 2px dashed var(--border); background: var(--card);
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 40px;
        }
        .drop-zone:hover { border-color: var(--orange); background: rgba(255, 149, 51, 0.03); transform: scale(1.01); }
        .drop-zone p { font-weight: 700; font-size: 1.1rem; color: var(--text); }
        .drop-zone span { font-size: 0.85rem; color: var(--text-dim); margin-top: 10px; font-weight: 500; }

        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        #user-display-pill {
            background: var(--card); backdrop-filter: blur(20px); padding: 8px 24px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto; min-width: 220px; justify-content: flex-start;
        }
        #user-display-pill:hover { transform: translateY(-2px); border-color: var(--orange); box-shadow: 0 15px 45px rgba(255,149,51,0.15); }
        .pill-info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
        #user-name { font-weight: 800; font-size: 0.85rem; font-family: 'Outfit', sans-serif; }
        #user-role-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; pointer-events: auto; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); filter: brightness(1.1); }

        .theme-switch {
            width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 30px rgba(0,0,0,0.1); pointer-events: auto; }
        .theme-switch:hover { transform: translateY(-2px); border-color: var(--orange); }

        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        body.dark-mode .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: block; }

        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 20000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 320px; max-width: 440px; padding: 18px 24px; border-radius: 24px; background: #1c1f26; border: 1px solid var(--border); color: #fff; font-size: 0.9rem; font-weight: 500; box-shadow: 0 12px 32px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); line-height: 1.4; }
        .toast.success { border-left: 6px solid var(--success); }
        .toast.error { border-left: 6px solid var(--error); }
        @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .loader-spinner { border: 3px solid rgba(255, 149, 51, 0.1); width: 28px; height: 28px; border-radius: 50%; border-left-color: var(--orange); animation: rotate 1s linear infinite; margin: 0 auto; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* Floating Footer */
        #floating-footer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            padding: 16px 32px; border-radius: 30px; border: 1.5px solid var(--border);
            display: flex; gap: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 7000;
        }
        body.dark-mode #floating-footer { background: rgba(28, 31, 38, 0.8); }

        .btn-footer {
            padding: 14px 28px; border-radius: 18px; font-weight: 800; font-size: 0.85rem;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; border: none; letter-spacing: 1px;
        }
        .btn-save-all { background: var(--orange); color: #fff; box-shadow: 0 8px 20px rgba(255,149,51,0.3); }
        .btn-save-all:hover { transform: translateY(-3px); }

        /* Promotions Styles */
        .promo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .promo-slot {
            aspect-ratio: 1/1;
            background: var(--input);
            border: 2px dashed var(--border);
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s;
            filter: grayscale(1);
            opacity: 0.6;
            text-align: center;
            padding: 10px;
        }
        .promo-slot:hover { border-color: var(--orange); transform: translateY(-5px); opacity: 1; }
        .promo-slot.active { filter: none; opacity: 1; border: 2px solid var(--orange); background: rgba(255, 149, 51, 0.05); }
        .promo-slot i { font-size: 2.5rem; margin-bottom: 10px; color: var(--text-dim); }
        .promo-slot.active i { color: var(--orange); }
        .promo-slot span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        .promo-slot.active span { color: var(--text); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 24px;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: var(--card); width: 100%; max-width: 500px; border-radius: 32px;
            padding: 40px; border: 1.5px solid var(--border); position: relative;
        }
        .modal-close { position: absolute; top: 25px; right: 25px; cursor: pointer; border: none; background: none; font-size: 1.5rem; color: var(--text-dim); }

        .promo-drop-zone {
            width: 100%; height: 150px; border-radius: 20px; border: 2px dashed var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; margin-bottom: 20px; overflow: hidden;
        }
        .promo-drop-zone img { width: 100%; height: 100%; object-fit: cover; }

        /* Gallery Grid */
        #gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .gallery-item {
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item .delete-btn {
            position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7);
            color: white; border: none; border-radius: 50%; width: 25px; height: 25px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Full Page Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        body.dark-mode #loader { background: #121418; color: white; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-spinner"></div>
        <p class="mt-3 fw-bold" style="margin-top: 15px; font-weight: 700;">Cargando constructor...</p>
    </div>

    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <div id="top-nav">
        <div>
             <button class="btn-panel-top" onclick="location.href='admin.html'">VOLVER</button>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-switch" id="theme-toggle">
                <i class="bi bi-sun-fill sun-icon"></i>
                <i class="bi bi-moon-stars-fill moon-icon"></i>
            </div>
            <div id="user-display-pill">
                <i class="bi bi-person-circle" style="font-size: 1.2rem;"></i>
                <div class="pill-info">
                    <div id="user-name">Usuario</div>
                    <div id="user-role-label">Owner</div>
                </div>
            </div>
        </div>
    </div>

    <div id="floating-footer">
        <button class="btn-footer btn-save-all" id="save-all-btn">Guardar Cambios</button>
    </div>

    <div class="container" id="main-app">
        <header>
            <img src="https://tragalero.com/assets/img/tragalero.png" class="logo-main" alt="Tragalero Logo">
            <p id="view-domain-title" style="font-weight: 700; color: var(--orange); font-size: 0.85rem; letter-spacing: 1px;">EDITOR WEB</p>
        </header>

        <div class="dashboard-layout">
            <div class="main-content">
                <!-- Promotions Section -->
                <div id="section-promos">
                    <div class="component-header">
                        <h2>Promociones de Eventos</h2>
                    </div>
                    <div class="promo-grid">
                        <div class="promo-slot" id="slot-christmas" onclick="openPromoModal('christmas')">
                            <i class="bi bi-gift"></i>
                            <span>Navidad</span>
                        </div>
                        <div class="promo-slot" id="slot-halloween" onclick="openPromoModal('halloween')">
                            <i class="bi bi-ghost"></i>
                            <span>Halloween</span>
                        </div>
                        <div class="promo-slot" id="slot-valentine" onclick="openPromoModal('valentine')">
                            <i class="bi bi-heart"></i>
                            <span>San Valentín</span>
                        </div>
                        <div class="promo-slot" id="slot-president" onclick="openPromoModal('president')">
                            <i class="bi bi-megaphone"></i>
                            <span>Anuncio</span>
                        </div>
                    </div>
                </div>

                <!-- Gallery Section -->
                <div id="section-gallery">
                    <div class="component-header">
                        <h2>Galería de Imágenes</h2>
                    </div>

                    <div class="drop-zone" id="drop-zone">
                        <p>Subir Imágenes</p>
                        <span>Haz clic o arrastra archivos aquí</span>
                        <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
                    </div>

                    <div id="gallery-container">
                        <!-- Images injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Promo Modal -->
    <div id="promo-modal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closePromoModal()"><i class="bi bi-x-lg"></i></button>
            <h3 id="promo-modal-title">Configurar Promo</h3>

            <div class="promo-drop-zone" id="promo-drop-zone">
                <img id="promo-preview" class="hidden">
                <div id="promo-drop-placeholder">
                    <p>Arrastra la imagen aquí</p>
                    <span style="font-size:0.75rem; color:var(--text-dim)">o haz clic para seleccionar</span>
                </div>
                <input type="file" id="promo-file-input" class="hidden" accept="image/*">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:0.75rem; font-weight:700; color:var(--orange); text-transform:uppercase; margin-bottom:8px;">Fecha Inicio</label>
                <input type="date" id="promo-start-date" style="width:100%; padding:14px; border-radius:16px; border:1px solid var(--border); background:var(--input); color:var(--text);">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:0.75rem; font-weight:700; color:var(--orange); text-transform:uppercase; margin-bottom:8px;">Fecha Fin</label>
                <input type="date" id="promo-end-date" style="width:100%; padding:14px; border-radius:16px; border:1px solid var(--border); background:var(--input); color:var(--text);">
            </div>

            <div style="display:flex; align-items:center; gap:10px; margin-bottom: 20px;">
                <input type="checkbox" id="promo-active" style="width:auto;">
                <label style="margin:0; font-weight: 600;">Promoción Activa</label>
            </div>

            <button class="btn-panel-top" id="btn-save-promo" style="width: 100%;">Guardar Promoción</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/supabase_logic.js"></script>

    <script>
        const CLOUD_NAME = "dbbjxhvz5";
        const UPLOAD_PRESET = "Tragalero";

        let currentUser = null;
        let localGallery = [];
        let localPromos = [];
        let currentPromoEvent = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            currentUser = await getLoggedInUser();

            if (!currentUser) {
                window.location.href = './login.html';
                return;
            }

            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-role-label').textContent = currentUser.role;

            await loadGallery();
            await loadPromos();

            initEvents();

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 1000);
        });

        async function loadGallery() {
            const { data } = await supabaseClient.from('galeria').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            localGallery = data || [];
            renderGallery();
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            container.innerHTML = localGallery.map((img, idx) => `
                <div class="gallery-item">
                    <img src="${img.image_url}">
                    <button class="delete-btn" onclick="removeImage(${idx})"><i class="bi bi-trash"></i></button>
                </div>
            `).join('');
        }

        async function loadPromos() {
            const { data } = await supabaseClient.from('promos').select('*').eq('user_id', currentUser.id);
            localPromos = data || [];
            updatePromoGrid();
        }

        function updatePromoGrid() {
            const events = ['christmas', 'halloween', 'valentine', 'president'];
            events.forEach(ev => {
                const slot = document.getElementById(`slot-${ev}`);
                const promo = localPromos.find(p => p.event_type === ev);
                slot.classList.toggle('active', promo && promo.is_active);
            });
        }

        function initEvents() {
            document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
            document.getElementById('file-input').onchange = (e) => uploadFiles(e.target.files);

            document.getElementById('promo-drop-zone').onclick = () => document.getElementById('promo-file-input').click();
            document.getElementById('promo-file-input').onchange = (e) => handlePromoFile(e.target.files[0]);

            document.getElementById('btn-save-promo').onclick = savePromo;
            document.getElementById('save-all-btn').onclick = saveAllChanges;
        }

        async function uploadFiles(files) {
            for (const file of files) {
                const url = await uploadToCloudinary(file);
                localGallery.unshift({ image_url: url, isNew: true });
            }
            renderGallery();
        }

        async function handlePromoFile(file) {
            const url = await uploadToCloudinary(file);
            const preview = document.getElementById('promo-preview');
            preview.src = url;
            preview.classList.remove('hidden');
            document.getElementById('promo-drop-placeholder').classList.add('hidden');
        }

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            const d = await res.json();
            return d.secure_url;
        }

        window.removeImage = (idx) => {
            localGallery.splice(idx, 1);
            renderGallery();
        };

        window.openPromoModal = (ev) => {
            currentPromoEvent = ev;
            const promo = localPromos.find(p => p.event_type === ev) || {};
            document.getElementById('promo-modal-title').textContent = `Configurar ${ev}`;
            const preview = document.getElementById('promo-preview');
            if (promo.image_url) {
                preview.src = promo.image_url;
                preview.classList.remove('hidden');
                document.getElementById('promo-drop-placeholder').classList.add('hidden');
            } else {
                preview.classList.add('hidden');
                document.getElementById('promo-drop-placeholder').classList.remove('hidden');
            }
            document.getElementById('promo-start-date').value = promo.start_date || '';
            document.getElementById('promo-end-date').value = promo.end_date || '';
            document.getElementById('promo-active').checked = promo.is_active || false;
            document.getElementById('promo-modal').classList.add('active');
        };

        window.closePromoModal = () => document.getElementById('promo-modal').classList.remove('active');

        async function savePromo() {
            const promoData = {
                user_id: currentUser.id,
                event_type: currentPromoEvent,
                image_url: document.getElementById('promo-preview').src,
                start_date: document.getElementById('promo-start-date').value || null,
                end_date: document.getElementById('promo-end-date').value || null,
                is_active: document.getElementById('promo-active').checked
            };
            const { error } = await supabaseClient.from('promos').upsert(promoData, { onConflict: 'user_id, event_type' });
            if (!error) {
                showToast("Promo guardada");
                closePromoModal();
                loadPromos();
            }
        }

        async function saveAllChanges() {
            const btn = document.getElementById('save-all-btn');
            btn.disabled = true;
            btn.textContent = "Guardando...";

            await supabaseClient.from('galeria').delete().eq('user_id', currentUser.id);
            if (localGallery.length > 0) {
                const toInsert = localGallery.map(img => ({ user_id: currentUser.id, image_url: img.image_url }));
                await supabaseClient.from('galeria').insert(toInsert);
            }

            btn.disabled = false;
            btn.textContent = "Guardar Cambios";
            showToast("Cambios guardados con éxito");
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast success';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function initTheme() {
            const toggle = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            toggle.onclick = () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            };
        }
    </script>
</body>
</html>
