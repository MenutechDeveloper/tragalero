<!DOCTYPE html>
<html data-bs-theme="dark" lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Ventas Presenciales - Tragalero</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/pastel-theme.css">

    <style>
        :root {
            --tragalero-radius: 30px;
            --tragalero-radius-lg: 40px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            margin: 0;
            padding: 0;
        }

        .admin-layout {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .content-panel {
            width: 100%;
            max-width: 900px;
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .bento-item {
            background: white;
            border-radius: var(--tragalero-radius);
            padding: 30px;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            text-align: center;
        }

        [data-bs-theme="dark"] .bento-item {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-color: rgba(255,255,255,0.05);
        }

        .bento-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .bento-item i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--bs-primary);
        }

        .reminder-card {
            background: white;
            border-radius: var(--tragalero-radius);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        [data-bs-theme="dark"] .reminder-card {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.05);
        }

        .lead-reminder-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 20px;
            background: rgba(0,0,0,0.02);
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        [data-bs-theme="dark"] .lead-reminder-item {
            background: rgba(255,255,255,0.03);
        }

        .lead-reminder-item:hover {
            background: rgba(0,0,0,0.05);
        }

        .date-badge {
            min-width: 60px;
            text-align: center;
            padding: 10px;
            border-radius: 15px;
            background: var(--bs-primary);
            color: white;
            margin-right: 15px;
            font-weight: 600;
            line-height: 1.2;
        }

        .date-badge span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .top-nav {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        [data-bs-theme="dark"] .back-btn {
            background: rgba(255,255,255,0.05);
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.1);
            transform: translateX(-5px);
        }

        @media (max-width: 576px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <div class="top-nav">
            <a href="./admin.html" class="back-btn">
                <i class="bi bi-arrow-left me-2"></i> Panel
            </a>
            <div id="authButtons"></div>
        </div>

        <div class="content-panel">
            <div class="welcome-header">
                <h1 class="fw-bold">Herramientas de Ventas</h1>
                <p class="text-muted">Gestiona tus prospectos y organiza tus visitas presenciales</p>
            </div>

            <div class="bento-grid">
                <a href="./directorioLead.html" class="bento-item">
                    <i class="bi bi-journal-bookmark-fill"></i>
                    <h3 class="fw-bold">Directorio de Leads</h3>
                    <p class="small text-muted mb-0">Registra y gestiona prospectos</p>
                </a>
                <a href="./directorioLead.html?status=Agendados" class="bento-item">
                    <i class="bi bi-calendar-check-fill"></i>
                    <h3 class="fw-bold">Visitas Agendadas</h3>
                    <p class="small text-muted mb-0">Revisa tus compromisos</p>
                </a>
            </div>

            <div class="reminder-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Próximas Visitas</h4>
                    <span class="badge bg-primary rounded-pill" id="totalReminders">0</span>
                </div>

                <div id="remindersContainer">
                    <div class="text-center py-4 text-muted">
                        <i class="bi bi-clock-history fs-1 d-block mb-2"></i>
                        Cargando recordatorios...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/theme.js"></script>
    <script src="./assets/js/supabase_logic.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAccess();
            if (!user || !['Admin', 'Ventas', 'CS'].includes(user.role)) {
                if (user) window.location.href = './admin.html';
                return;
            }

            await renderUserMenu('authButtons');
            loadUpcomingVisits();
        });

        async function loadUpcomingVisits() {
            const container = document.getElementById('remindersContainer');
            const totalBadge = document.getElementById('totalReminders');

            try {
                // Fetch leads with status 'Agendados' and scheduled_date >= today
                const today = new Date().toISOString();
                const { data: leads, error } = await supabaseClient
                    .from('leads')
                    .select('*')
                    .eq('status', 'Agendados')
                    .gte('scheduled_date', today)
                    .order('scheduled_date', { ascending: true })
                    .limit(5);

                if (error) throw error;

                if (!leads || leads.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-4 text-muted">
                            <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>
                            No tienes visitas agendadas próximamente.
                        </div>
                    `;
                    totalBadge.textContent = '0';
                    return;
                }

                totalBadge.textContent = leads.length;
                container.innerHTML = '';

                leads.forEach(lead => {
                    const date = new Date(lead.scheduled_date);
                    const day = date.getDate();
                    const month = date.toLocaleString('es-ES', { month: 'short' });
                    const time = date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

                    const item = document.createElement('div');
                    item.className = 'lead-reminder-item';
                    item.innerHTML = `
                        <div class="date-badge">
                            ${day}
                            <span>${month}</span>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-bold">${escapeHtml(lead.business_name)}</div>
                            <div class="small text-muted">
                                <i class="bi bi-clock me-1"></i> ${time} - ${escapeHtml(lead.address || 'Sin dirección')}
                            </div>
                        </div>
                        <a href="./directorioLead.html?id=${lead.id}" class="btn btn-sm btn-light rounded-pill">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    `;
                    container.appendChild(item);
                });

            } catch (err) {
                console.error("Error loading reminders:", err);
                container.innerHTML = `<div class="alert alert-danger">Error al cargar recordatorios</div>`;
            }
        }
    </script>
</body>

</html>
