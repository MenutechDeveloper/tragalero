<!DOCTYPE html>
<html data-bs-theme="dark" lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Directorio de Leads - Tragalero</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/pastel-theme.css">

    <style>
        :root {
            --tragalero-radius: 30px;
            --tragalero-radius-lg: 40px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding-bottom: 80px; /* Space for FAB */
        }

        [data-bs-theme="dark"] body {
            background-color: #121212;
            color: #f0f0f0;
        }

        .header-section {
            padding: 30px 20px;
            background: white;
            border-bottom-left-radius: var(--tragalero-radius-lg);
            border-bottom-right-radius: var(--tragalero-radius-lg);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        [data-bs-theme="dark"] .header-section {
            background: #1e1e1e;
        }

        .status-tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 20px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        .status-tabs-container::-webkit-scrollbar {
            display: none; /* Hide scrollbar Chrome/Safari */
        }

        .status-tab {
            display: inline-block;
            padding: 10px 20px;
            margin-right: 10px;
            border-radius: 20px;
            background: rgba(0,0,0,0.05);
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        [data-bs-theme="dark"] .status-tab {
            background: rgba(255,255,255,0.05);
        }

        .status-tab.active {
            background: var(--bs-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(var(--bs-primary-rgb), 0.3);
        }

        .lead-card {
            background: white;
            border-radius: var(--tragalero-radius);
            margin: 15px 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
            touch-action: pan-y;
        }

        [data-bs-theme="dark"] .lead-card {
            background: #1e1e1e;
            border-color: rgba(255,255,255,0.05);
        }

        .lead-img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            object-fit: cover;
            margin-right: 15px;
            background: #eee;
        }

        .lead-info h5 {
            margin-bottom: 2px;
            font-weight: 700;
        }

        .lead-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            color: white;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.8;
            color: white;
        }

        .btn-call { background-color: #4CAF50; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-maps { background-color: #4285F4; }

        .fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: var(--bs-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 10px 30px rgba(var(--bs-primary-rgb), 0.4);
            border: none;
            z-index: 1000;
            transition: transform 0.2s;
        }

        .fab-add:active {
            transform: scale(0.9);
        }

        /* Swipe Styles */
        .swipe-hint {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            z-index: -1;
        }

        .swipe-left-hint { left: 0; background-color: #ffc107; }
        .swipe-right-hint { right: 0; background-color: #198754; }

        .modal-content {
            border-radius: var(--tragalero-radius-lg);
            border: none;
        }

        .form-control, .form-select {
            border-radius: 15px;
            padding: 12px 20px;
            background-color: rgba(0,0,0,0.03);
            border: 1px solid transparent;
        }

        [data-bs-theme="dark"] .form-control, [data-bs-theme="dark"] .form-select {
            background-color: rgba(255,255,255,0.05);
            color: white;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(var(--bs-primary-rgb), 0.1);
            border-color: var(--bs-primary);
        }

        .reminder-indicator {
            font-size: 0.75rem;
            color: #ff9800;
            display: flex;
            align-items: center;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="header-section">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="./presencialSales.html" class="text-inherit text-decoration-none">
                <i class="bi bi-chevron-left fs-4"></i>
            </a>
            <h4 class="fw-bold mb-0">Directorio de Leads</h4>
            <div id="authButtons"></div>
        </div>

        <div class="input-group search-bar mb-1">
            <span class="input-group-text bg-transparent border-0"><i class="bi bi-search"></i></span>
            <input type="text" id="leadSearch" class="form-control bg-light border-0" placeholder="Buscar negocio o dueño...">
        </div>
    </div>

    <div class="status-tabs-container" id="statusTabs">
        <a href="#" class="status-tab active" data-status="No Visitados">No Visitados</a>
        <a href="#" class="status-tab" data-status="Visitados">Visitados</a>
        <a href="#" class="status-tab" data-status="Seguimiento">Seguimiento</a>
        <a href="#" class="status-tab" data-status="Agendados">Agendados</a>
        <a href="#" class="status-tab" data-status="Venta">Venta</a>
        <a href="#" class="status-tab" data-status="No Interesados">No Interesados</a>
    </div>

    <div id="leadsList">
        <!-- Leads will be loaded here -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
    </div>

    <button class="fab-add" data-bs-toggle="modal" data-bs-target="#leadModal" onclick="prepareAddLead()">
        <i class="bi bi-plus-lg"></i>
    </button>

    <!-- Lead Modal -->
    <div class="modal fade" id="leadModal" tabindex="-1" aria-labelledby="leadModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="leadModalLabel">Nuevo Prospecto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="leadForm">
                        <input type="hidden" id="leadId">

                        <div class="text-center mb-4">
                            <div class="position-relative d-inline-block">
                                <img src="https://via.placeholder.com/150?text=Subir+Foto" id="leadImgPreview" class="rounded-4 shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">
                                <button type="button" class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle" onclick="document.getElementById('leadImgInput').click()">
                                    <i class="bi bi-camera-fill"></i>
                                </button>
                                <input type="file" id="leadImgInput" class="d-none" accept="image/*">
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small fw-bold">Fecha de Visita</label>
                                <input type="date" id="visitDate" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Nombre del Local</label>
                                <input type="text" id="businessName" class="form-control" required placeholder="Ej. El Fogón de Pepe">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Dueño / Encargado</label>
                                <input type="text" id="ownerName" class="form-control" placeholder="Nombre completo">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Teléfono / WhatsApp</label>
                                <input type="tel" id="phone" class="form-control" placeholder="10 dígitos">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Dirección</label>
                                <textarea id="address" class="form-control" rows="2" placeholder="Calle, número, colonia..."></textarea>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold">Status</label>
                                <select id="status" class="form-select">
                                    <option value="No Visitados">No Visitados</option>
                                    <option value="Visitados">Visitados</option>
                                    <option value="Seguimiento">Seguimiento</option>
                                    <option value="Agendados">Agendados</option>
                                    <option value="Venta">Venta</option>
                                    <option value="No Interesados">No Interesados</option>
                                </select>
                            </div>
                            <div class="col-6" id="scheduledDateContainer">
                                <label class="form-label small fw-bold">Próxima Cita</label>
                                <input type="datetime-local" id="scheduledDate" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Redes Sociales (JSON)</label>
                                <input type="text" id="socialMedia" class="form-control" placeholder='{"ig": "@usuario", "fb": "facebook.com/..."}'>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Notas / Observaciones</label>
                                <textarea id="notes" class="form-control" rows="3"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" id="saveLeadBtn">Guardar Prospecto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/theme.js"></script>
    <script src="./assets/js/supabase_logic.js"></script>

    <script>
        let currentUser = null;
        let currentStatus = 'No Visitados';
        let leadsData = [];
        let leadModal = null;

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await checkAccess();
            if (!currentUser || !['Admin', 'Ventas', 'CS'].includes(currentUser.role)) {
                if (currentUser) window.location.href = './admin.html';
                return;
            }
            await renderUserMenu('authButtons');

            leadModal = new bootstrap.Modal(document.getElementById('leadModal'));

            await loadLeads();

            // Check if status or id is in URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('status')) {
                currentStatus = urlParams.get('status');
                updateActiveTab();
                renderLeads();
            }

            if (urlParams.has('id')) {
                editLead(urlParams.get('id'));
            }

            // Tab events
            document.querySelectorAll('.status-tab').forEach(tab => {
                tab.onclick = (e) => {
                    e.preventDefault();
                    currentStatus = tab.dataset.status;
                    updateActiveTab();
                    renderLeads();
                };
            });

            // Search event
            document.getElementById('leadSearch').oninput = (e) => {
                renderLeads(e.target.value);
            };

            // Image preview
            document.getElementById('leadImgInput').onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        document.getElementById('leadImgPreview').src = re.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Save button
            document.getElementById('saveLeadBtn').onclick = saveLead;

            loadLeads();
        });

        function updateActiveTab() {
            document.querySelectorAll('.status-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.status === currentStatus);
            });
        }

        async function loadLeads() {
            const list = document.getElementById('leadsList');
            try {
                const { data, error } = await supabaseClient
                    .from('leads')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                leadsData = data || [];
                renderLeads();
            } catch (err) {
                console.error("Error loading leads:", err);
                list.innerHTML = `<div class="alert alert-danger m-3">Error: ${err.message}</div>`;
            }
        }

        function renderLeads(searchTerm = '') {
            const list = document.getElementById('leadsList');

            // Weekly Reminders Section if on 'Agendados'
            if (currentStatus === 'Agendados' && !searchTerm) {
                const now = new Date();
                const nextWeek = new Date();
                nextWeek.setDate(now.getDate() + 7);

                const weeklyLeads = leadsData.filter(l => {
                    if (l.status !== 'Agendados' || !l.scheduled_date) return false;
                    const d = new Date(l.scheduled_date);
                    return d >= now && d <= nextWeek;
                }).sort((a, b) => new Date(a.scheduled_date) - new Date(b.scheduled_date));

                if (weeklyLeads.length > 0) {
                    const reminderSection = document.createElement('div');
                    reminderSection.className = 'px-4 mb-4';
                    reminderSection.innerHTML = `
                        <h6 class="fw-bold text-primary mb-3">Próximas Visitas de la Semana</h6>
                        <div class="d-flex overflow-x-auto pb-2 gap-3" style="scrollbar-width: none;">
                            ${weeklyLeads.map(l => {
                                const d = new Date(l.scheduled_date);
                                return `
                                    <div class="bg-primary bg-opacity-10 p-3 rounded-4 shadow-sm" style="min-width: 200px; border: 1px solid rgba(var(--bs-primary-rgb), 0.2);" onclick="editLead(${l.id})">
                                        <div class="fw-bold text-primary truncate">${escapeHtml(l.business_name)}</div>
                                        <div class="small text-muted mb-1">${d.toLocaleDateString()} - ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                        <div class="small text-muted truncate"><i class="bi bi-geo-alt"></i> ${escapeHtml(l.address || 'Sin dir')}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                    list.appendChild(reminderSection);
                }
            }

            const filtered = leadsData.filter(l => {
                const matchesStatus = l.status === currentStatus;
                const matchesSearch = !searchTerm ||
                    l.business_name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (l.owner_name && l.owner_name.toLowerCase().includes(searchTerm.toLowerCase()));
                return matchesStatus && matchesSearch;
            });

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-5 opacity-50">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        No hay prospectos en "${currentStatus}"
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            filtered.forEach(lead => {
                const card = document.createElement('div');
                card.className = 'lead-card animate-fade-in';
                card.dataset.id = lead.id;

                const phone = lead.phone ? lead.phone.replace(/\D/g, '') : '';
                const hasReminder = lead.status === 'Agendados' && lead.scheduled_date;
                let reminderHtml = '';
                if (hasReminder) {
                    const date = new Date(lead.scheduled_date);
                    reminderHtml = `
                        <div class="reminder-indicator">
                            <i class="bi bi-clock-fill me-1"></i>
                            ${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="swipe-hint swipe-left-hint"><i class="bi bi-arrow-left"></i></div>
                    <div class="swipe-hint swipe-right-hint"><i class="bi bi-arrow-right"></i></div>
                    <div class="d-flex align-items-center mb-3">
                        <img src="${lead.image_url || 'https://via.placeholder.com/150?text=Negocio'}" class="lead-img" onclick="editLead(${lead.id})">
                        <div class="lead-info flex-grow-1" onclick="editLead(${lead.id})">
                            <h5>${escapeHtml(lead.business_name)}</h5>
                            <div class="small text-muted">${escapeHtml(lead.owner_name || 'Sin nombre de dueño')}</div>
                            ${reminderHtml}
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-link text-muted p-0" data-bs-toggle="dropdown">
                                <i class="bi bi-three-dots-vertical fs-5"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end rounded-4 border-0 shadow">
                                <li><a class="dropdown-item" href="#" onclick="editLead(${lead.id}); return false;"><i class="bi bi-pencil me-2"></i>Editar</a></li>
                                <li><a class="dropdown-item text-danger" href="#" onclick="deleteLead(${lead.id}); return false;"><i class="bi bi-trash me-2"></i>Eliminar</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="small text-muted mb-3">
                        <i class="bi bi-geo-alt-fill me-1"></i> ${escapeHtml(lead.address || 'Sin dirección')}
                    </div>
                    <div class="lead-actions">
                        <a href="tel:${phone}" class="action-btn btn-call"><i class="bi bi-telephone-fill"></i></a>
                        <a href="https://wa.me/52${phone}" target="_blank" class="action-btn btn-whatsapp"><i class="bi bi-whatsapp"></i></a>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lead.address)}" target="_blank" class="action-btn btn-maps"><i class="bi bi-geo-alt-fill"></i></a>
                    </div>
                `;
                list.appendChild(card);
                initSwipe(card, lead);
            });
        }

        // Simple Swipe Logic
        function initSwipe(el, lead) {
            let startX = 0;
            let currentX = 0;
            const threshold = 100;
            const statuses = ['No Visitados', 'Visitados', 'Seguimiento', 'Agendados', 'Venta', 'No Interesados'];
            const currentIndex = statuses.indexOf(lead.status);

            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                currentX = startX; // Fix swipe bug
            }, {passive: true});

            el.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX;
                const diff = currentX - startX;
                if (Math.abs(diff) > 10) {
                    el.style.transform = `translateX(${diff}px)`;
                    el.style.transition = 'none';

                    if (diff > 0) {
                        el.querySelector('.swipe-left-hint').style.zIndex = '1';
                        el.querySelector('.swipe-right-hint').style.zIndex = '-1';
                    } else {
                        el.querySelector('.swipe-left-hint').style.zIndex = '-1';
                        el.querySelector('.swipe-right-hint').style.zIndex = '1';
                    }
                }
            }, {passive: true});

            el.addEventListener('touchend', async (e) => {
                const diff = currentX - startX;
                el.style.transition = 'transform 0.3s ease';

                if (diff > threshold && currentIndex > 0) {
                    // Swipe Right -> Prev Status
                    await updateLeadStatus(lead.id, statuses[currentIndex - 1]);
                } else if (diff < -threshold && currentIndex < statuses.length - 1) {
                    // Swipe Left -> Next Status
                    await updateLeadStatus(lead.id, statuses[currentIndex + 1]);
                } else {
                    el.style.transform = 'translateX(0)';
                }

                startX = 0;
                currentX = 0;
            });
        }

        async function updateLeadStatus(id, newStatus) {
            try {
                const { error } = await supabaseClient
                    .from('leads')
                    .update({ status: newStatus })
                    .eq('id', id);

                if (error) throw error;

                // Animación de salida antes de recargar
                const el = document.querySelector(`.lead-card[data-id="${id}"]`);
                if (el) {
                    el.style.transform = 'scale(0)';
                    el.style.opacity = '0';
                }

                setTimeout(loadLeads, 300);
            } catch (err) {
                alert("Error al cambiar status: " + err.message);
                loadLeads();
            }
        }

        async function saveLead() {
            const btn = document.getElementById('saveLeadBtn');
            const id = document.getElementById('leadId').value;
            const file = document.getElementById('leadImgInput').files[0];

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Guardando...';

            try {
                let socialMedia = {};
                try {
                    socialMedia = JSON.parse(document.getElementById('socialMedia').value || '{}');
                } catch (e) {
                    alert("El campo Redes Sociales debe ser un JSON válido. Ejemplo: {\"ig\": \"@usuario\"}");
                    btn.disabled = false;
                    btn.innerHTML = 'Guardar Prospecto';
                    return;
                }

                let imageUrl = document.getElementById('leadImgPreview').src;
                if (file) {
                    const upload = await uploadToCloudinary(file);
                    imageUrl = upload.url;
                }

                const leadData = {
                    visit_date: document.getElementById('visitDate').value || new Date().toISOString().split('T')[0],
                    business_name: document.getElementById('businessName').value,
                    owner_name: document.getElementById('ownerName').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    status: document.getElementById('status').value,
                    scheduled_date: document.getElementById('scheduledDate').value || null,
                    notes: document.getElementById('notes').value,
                    social_media: socialMedia,
                    image_url: imageUrl,
                    salesperson_id: currentUser.id
                };

                let error;
                if (id) {
                    ({ error } = await supabaseClient.from('leads').update(leadData).eq('id', id));
                } else {
                    ({ error } = await supabaseClient.from('leads').insert([leadData]));
                }

                if (error) throw error;

                leadModal.hide();
                loadLeads();
            } catch (err) {
                alert("Error al guardar: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Guardar Prospecto';
            }
        }

        function prepareAddLead() {
            document.getElementById('leadForm').reset();
            document.getElementById('leadId').value = '';
            document.getElementById('leadImgPreview').src = 'https://via.placeholder.com/150?text=Subir+Foto';
            document.getElementById('leadModalLabel').textContent = 'Nuevo Prospecto';
            document.getElementById('status').value = currentStatus;
        }

        async function editLead(id) {
            const lead = leadsData.find(l => l.id == id);
            if (!lead) return;

            document.getElementById('leadId').value = lead.id;
            document.getElementById('visitDate').value = lead.visit_date || '';
            document.getElementById('businessName').value = lead.business_name;
            document.getElementById('ownerName').value = lead.owner_name || '';
            document.getElementById('phone').value = lead.phone || '';
            document.getElementById('address').value = lead.address || '';
            document.getElementById('status').value = lead.status;
            document.getElementById('notes').value = lead.notes || '';
            document.getElementById('socialMedia').value = JSON.stringify(lead.social_media || {});
            document.getElementById('leadImgPreview').src = lead.image_url || 'https://via.placeholder.com/150?text=Negocio';

            if (lead.scheduled_date) {
                const date = new Date(lead.scheduled_date);
                // Adjust to local time for input datetime-local
                const tzOffset = date.getTimezoneOffset() * 60000;
                const localISODate = new Date(date.getTime() - tzOffset).toISOString().slice(0, 16);
                document.getElementById('scheduledDate').value = localISODate;
            } else {
                document.getElementById('scheduledDate').value = '';
            }

            document.getElementById('leadModalLabel').textContent = 'Editar Prospecto';
            leadModal.show();
        }

        async function deleteLead(id) {
            if (!confirm('¿Estás seguro de eliminar este prospecto?')) return;
            try {
                const { error } = await supabaseClient.from('leads').delete().eq('id', id);
                if (error) throw error;
                loadLeads();
            } catch (err) {
                alert("Error al eliminar: " + err.message);
            }
        }
    </script>
</body>

</html>
