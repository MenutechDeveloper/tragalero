<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constructor Web - Tragalero</title>
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 400px;
            --primary-color: #7c83fd;
        }
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: #f4f7f6;
        }
        #editor-container {
            display: flex;
            height: 100vh;
        }
        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
            background: var(--primary-color);
            color: white;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        /* Preview */
        #preview-container {
            flex: 1;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .preview-toolbar {
            height: 60px;
            background: white;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
            transition: width 0.3s ease;
            margin: 0 auto;
        }
        /* Device Switcher */
        .device-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            color: #666;
        }
        .device-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Editing Elements */
        .editable-highlight {
            outline: 2px solid var(--primary-color) !important;
            outline-offset: 2px;
        }

        /* Drag & Drop Zone */
        .upload-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
            margin-bottom: 10px;
        }
        .upload-zone:hover {
            border-color: var(--primary-color);
            background: #f0f1ff;
        }
        .upload-zone i {
            font-size: 24px;
            color: var(--primary-color);
        }

        /* Accordion Customization */
        .accordion-button:not(.collapsed) {
            background-color: #f0f1ff;
            color: var(--primary-color);
        }

        /* Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* Responsive Previews */
        .preview-desktop { width: 100% !important; }
        .preview-tablet { width: 768px !important; }
        .preview-mobile { width: 375px !important; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 fw-bold">Cargando constructor...</p>
</div>

<div id="editor-container">
    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <a href="./choiseTemplate.html" class="btn btn-sm btn-light text-primary fw-bold">
                    <i class="bi bi-arrow-left"></i> Plantillas
                </a>
                <button class="btn btn-sm btn-light" id="save-btn">
                    <i class="bi bi-cloud-arrow-up"></i> Guardar
                </button>
            </div>
            <h5 class="mb-0 fw-bold">Editor Web</h5>
        </div>

        <div class="sidebar-content">
            <div id="edit-sections" class="accordion">
                <!-- Dynamic Sections will be injected here -->
            </div>
        </div>

        <div class="p-3 border-top bg-light">
            <button class="btn btn-outline-primary w-100" id="btn-view-public">
                <i class="bi bi-eye"></i> Vista Pública
            </button>
        </div>
    </aside>

    <!-- Preview -->
    <main id="preview-container">
        <div class="preview-toolbar">
            <button class="device-btn active" data-device="desktop" title="Escritorio">
                <i class="bi bi-laptop"></i>
            </button>
            <button class="device-btn" data-device="tablet" title="Tablet">
                <i class="bi bi-tablet"></i>
            </button>
            <button class="device-btn" data-device="mobile" title="Móvil">
                <i class="bi bi-phone"></i>
            </button>
            <div class="vr mx-2"></div>
            <span class="badge bg-secondary" id="template-name">Plantilla: Foodie</span>
        </div>

        <iframe id="preview-frame" src="about:blank"></iframe>
    </main>
</div>

<!-- JS Libraries -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase_logic.js"></script>

<script>
    const CLOUD_NAME = "dbbjxhvz5";
    const UPLOAD_PRESET = "Tragalero";

    const urlParams = new URLSearchParams(window.location.search);
    const viewUserId = urlParams.get('user');
    const user = getLoggedInUser();
    const isViewOnly = !!viewUserId;

    let webConfig = {};
    let iframeDoc = null;
    let activeTemplateId = 'plantilla1.html';

    // Initialization
    window.addEventListener('load', async () => {
        if (!isViewOnly && !user) {
            window.location.href = './login.html';
            return;
        }

        if (isViewOnly) {
            document.getElementById('sidebar').style.display = 'none';
            document.querySelector('.preview-toolbar').style.display = 'none';
        }

        await loadConfig();

        // Determine active template: URL param > Saved config > Default
        const urlTemplate = urlParams.get('template');
        if (urlTemplate) {
            activeTemplateId = urlTemplate;
        } else if (webConfig && webConfig.templateId) {
            activeTemplateId = webConfig.templateId;
        } else {
            activeTemplateId = 'plantilla1.html';
        }

        const iframe = document.getElementById('preview-frame');
        iframe.src = activeTemplateId;

        // Update Template Name in UI
        const templateNameEl = document.getElementById('template-name');
        if (activeTemplateId.includes('plantilla1')) templateNameEl.innerText = 'Plantilla 1: Foodie';
        else if (activeTemplateId.includes('plantilla2')) templateNameEl.innerText = 'Plantilla 2: Profesional';
        else if (activeTemplateId.includes('plantilla3')) templateNameEl.innerText = 'Plantilla 3: Heladería';
        else templateNameEl.innerText = 'Personalizada';

        setupIframe();
        setupDeviceSwitcher();

        document.getElementById('save-btn').onclick = saveConfig;
        document.getElementById('btn-view-public').onclick = () => {
            const userId = isViewOnly ? viewUserId : user.id;
            const publicUrl = `${window.location.origin}${window.location.pathname}?user=${userId}&template=${activeTemplateId}`;
            window.open(publicUrl, '_blank');
        };

        // Update back button to preserve template context
        const backBtn = document.querySelector('a[href="./choiseTemplate.html"]');
        if (backBtn) {
            backBtn.href = `./choiseTemplate.html?lastTemplate=${activeTemplateId}`;
        }

        // Hide loader after a delay to ensure iframe is ready
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 1500);
    });

    async function loadConfig() {
        const targetId = viewUserId || user.id;
        try {
            const { data, error } = await supabaseClient
                .from('user_websites')
                .select('config')
                .eq('user_id', targetId)
                .single();

            if (data && data.config) {
                webConfig = data.config;

                // Detect legacy structure: flat config without templateId
                // If it's legacy and has content, migrate it to plantilla1.html
                if (!webConfig.templateId && Object.keys(webConfig).length > 0) {
                    console.log("Migrating legacy config...");
                    const legacyConfig = { ...webConfig };
                    webConfig = {
                        'plantilla1.html': legacyConfig,
                        'templateId': 'plantilla1.html'
                    };
                }
            }
        } catch (err) {
            console.error("Error loading config:", err);
        }
    }

    async function saveConfig() {
        if (isViewOnly) return;
        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Guardando...';

        // Ensure current template is saved
        webConfig.templateId = activeTemplateId;

        try {
            const { error } = await supabaseClient
                .from('user_websites')
                .upsert([{ user_id: user.id, config: webConfig }], { onConflict: 'user_id' });

            if (error) throw error;
            alert("¡Cambios guardados con éxito!");
        } catch (err) {
            alert("Error al guardar: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> Guardar';
        }
    }

    function setupIframe() {
        const iframe = document.getElementById('preview-frame');

        const onIframeLoaded = () => {
            console.log("Iframe loaded");
            try {
                iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (!iframeDoc || iframeDoc.location.href === 'about:blank') {
                    console.log("Iframe doc not ready yet");
                    return;
                }

                // Instrument before applying config for dynamic IDs
                // We always instrument so the IDs exist for applyConfigToIframe
                instrumentIframe();

                if (!isViewOnly) {
                    generateSidebar();
                }
                applyConfigToIframe();
            } catch (err) {
                console.error("Error setting up iframe:", err);
            }
        };

        iframe.onload = onIframeLoaded;

        // Sometimes onload doesn't fire for local files or it fires too early
        const checkIframe = setInterval(() => {
            if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete' && !iframeDoc) {
                console.log("Manual iframe check trigger");
                onIframeLoaded();
                clearInterval(checkIframe);
            }
        }, 500);
        setTimeout(() => clearInterval(checkIframe), 5000);
    }

    function applyConfigToIframe() {
        const config = webConfig[activeTemplateId];
        if (!config || Object.keys(config).length === 0) return;

        Object.entries(config).forEach(([id, data]) => {
            const el = iframeDoc.querySelector(`[data-builder-id="${id}"]`) || iframeDoc.getElementById(id);
            if (!el) return;

            if (data.text !== undefined) el.innerText = data.text;
            if (data.src !== undefined) {
                el.src = data.src;
                // If it's an iframe, we might need to reload or it handles it via src update
            }
            if (data.href !== undefined) el.href = data.href;
            if (data.bgImage !== undefined) el.style.backgroundImage = `url('${data.bgImage}')`;
        });
    }

    function instrumentIframe() {
        // Automatically assign IDs to editable elements if they don't have them
        const selectors = {
            'text': 'h1, h2, h3, h4, h5, h6, p, a, span, i, .btn, .navbar-link, .nav-link, .navbar-brand, time, data, address, strong, em, label',
            'image': 'img, iframe, video',
            'bg': 'section, header, footer, main > section, [class*="section"], .hero, .cta, .footer-top, .about-banner, .delivery-banner'
        };

        let counter = 0;

        // 1. First Pass: Mark all Sections
        const sections = iframeDoc.querySelectorAll(selectors.bg);
        sections.forEach((sec, idx) => {
            const sectionId = sec.id || `section-${idx}`;
            sec.setAttribute('data-builder-section', sectionId);

            // Improved section name logic
            let sectionName = sec.getAttribute('data-label') || sec.id;
            if (!sectionName) {
                // Filter out common technical classes
                const techClasses = ['section-padding', 'bg-dark', 'text-white', 'text-center', 'container', 'row', 'col', 'section', 'bg-light'];
                const classes = Array.from(sec.classList).filter(c => !techClasses.some(tc => c.includes(tc)));
                sectionName = classes[0] || `Sección ${idx + 1}`;
            }
            sec.setAttribute('data-section-name', sectionName);
        });

        // 2. Second Pass: Mark Editable Elements
        iframeDoc.querySelectorAll(`${selectors.text}, ${selectors.image}`).forEach(el => {
            // Skip if already marked or is a section itself
            if (el.hasAttribute('data-builder-id') || el.hasAttribute('data-builder-section')) return;

            // Skip complex containers but keep small ones like icons or buttons with simple text
            const allowedChildren = ['SPAN', 'I', 'B', 'STRONG', 'EM', 'ION-ICON'];
            const childrenArray = Array.from(el.children);
            const hasComplexChildren = childrenArray.some(child => !allowedChildren.includes(child.tagName));

            if (el.tagName !== 'IMG' && el.tagName !== 'IFRAME' && el.tagName !== 'VIDEO' && hasComplexChildren) {
                // Special case for buttons or links with icons: if they have exactly one icon and some text, allow it
                const iconChildren = childrenArray.filter(c => c.tagName === 'ION-ICON' || c.tagName === 'I');
                if (iconChildren.length > 0 && iconChildren.length === childrenArray.length) {
                    // It's just icons, maybe editable if we support icon change, but for now skip
                    return;
                }
                if (iconChildren.length === 1 && childrenArray.length === 1) {
                    // One icon + text (text is a sibling node) - Allow this!
                } else {
                    return;
                }
            }

            if (el.tagName === 'ION-ICON') return;

            const id = el.id || `el-${counter++}`;
            el.setAttribute('data-builder-id', id);
            el.classList.add('builder-editable');
            el.style.cursor = 'pointer';
        });

        // 3. Mark for background images
        sections.forEach((sec, idx) => {
            const computedStyle = window.getComputedStyle(sec);
            const bgImg = computedStyle.backgroundImage;
            if (bgImg && bgImg !== 'none' && bgImg !== 'initial' && bgImg.includes('url(')) {
                if (!sec.getAttribute('data-builder-id')) {
                    const id = sec.id || `bg-${idx}`;
                    sec.setAttribute('data-builder-id', id);
                    sec.setAttribute('data-has-bg', 'true');
                    sec.classList.add('builder-editable');
                }
            }
        });

        // 3. Click interaction
        iframeDoc.addEventListener('click', (e) => {
            const el = e.target.closest('[data-builder-id]');
            if (el) {
                e.preventDefault();
                e.stopPropagation();

                // Highlight
                iframeDoc.querySelectorAll('.editable-highlight').forEach(h => h.classList.remove('editable-highlight'));
                el.classList.add('editable-highlight');

                // Notify parent
                const builderId = el.getAttribute('data-builder-id');
                const sectionId = el.closest('[data-builder-section]').getAttribute('data-builder-section');

                window.postMessage({
                    type: 'element-clicked',
                    builderId: builderId,
                    sectionId: sectionId
                }, '*');
            }
        }, true);
    }

    function generateSidebar() {
        const accordion = document.getElementById('edit-sections');
        accordion.innerHTML = '';

        const sections = iframeDoc.querySelectorAll('[data-builder-section]');
        sections.forEach((sec, idx) => {
            const sectionId = sec.getAttribute('data-builder-section');
            const sectionName = sec.getAttribute('data-section-name');

            const accordionItem = document.createElement('div');
            accordionItem.className = 'accordion-item';
            accordionItem.id = `accordion-item-${sectionId}`;

            const editables = Array.from(sec.querySelectorAll('[data-builder-id]'));

            // Filter to only show elements that are direct children or specifically marked (to avoid too many nested duplicates)
            const filteredEditables = editables.filter(el => {
                const parentSection = el.closest('[data-builder-section]');
                return parentSection === sec;
            });

            let fieldsHtml = '';

            filteredEditables.forEach(el => {
                const id = el.getAttribute('data-builder-id');
                const label = el.getAttribute('data-label') || id;
                const tagName = el.tagName.toLowerCase();
                const isBg = el.hasAttribute('data-has-bg');

                if (tagName === 'img' || tagName === 'iframe' || isBg) {
                    const currentSrc = isBg ? (window.getComputedStyle(el).backgroundImage.slice(5, -2)) : el.src;
                    const isIframe = tagName === 'iframe';

                    fieldsHtml += `
                        <div class="mb-3 border-bottom pb-3 field-group" data-field-for="${id}" onmouseenter="focusElement('${id}')">
                            <label class="form-label small fw-bold text-primary"><i class="bi bi-${isIframe ? 'code-slash' : 'image'}"></i> ${label}</label>
                            ${isIframe ? `
                                <input type="text" class="form-control form-control-sm" value="${currentSrc}" oninput="updateSrc('${id}', this.value)">
                                <p class="extra-small text-muted mt-1">Pega aquí el enlace del mapa o video</p>
                            ` : `
                            <div class="upload-zone"
                                 onclick="triggerUpload('${id}', '${isBg ? 'bg' : 'img'}')"
                                 ondragover="handleDragOver(event, this)"
                                 ondragleave="handleDragLeave(event, this)"
                                 ondrop="handleDrop(event, this, '${id}', '${isBg ? 'bg' : 'img'}')">
                                <i class="bi bi-cloud-arrow-up"></i>
                                <p class="mb-0 small text-muted">Click o Arrastra aquí</p>
                                <img src="${currentSrc}" id="sidebar-preview-${id}" class="mt-2 rounded shadow-sm" style="max-width: 100%; max-height: 100px;">
                            </div>`}
                        </div>
                    `;
                } else {
                    fieldsHtml += `
                        <div class="mb-3 border-bottom pb-3 field-group" data-field-for="${id}" onmouseenter="focusElement('${id}')">
                            <label class="form-label small fw-bold text-primary"><i class="bi bi-type"></i> ${label}</label>
                            <textarea class="form-control form-control-sm" rows="3" oninput="updateContent('${id}', this.value)" onfocus="focusElement('${id}')">${el.innerText.trim()}</textarea>
                            ${tagName === 'a' ? `
                                <div class="mt-2">
                                    <label class="form-label extra-small text-muted mb-0">Enlace (URL)</label>
                                    <input type="text" class="form-control form-control-sm" value="${el.getAttribute('href') || ''}" oninput="updateLink('${id}', this.value)">
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
            });

            if (fieldsHtml === '') return; // Don't show empty sections

            accordionItem.innerHTML = `
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${sectionId}">
                        ${sectionName.toUpperCase()}
                    </button>
                </h2>
                <div id="collapse-${sectionId}" class="accordion-collapse collapse" data-bs-parent="#edit-sections">
                    <div class="accordion-body p-3">
                        ${fieldsHtml}
                    </div>
                </div>
            `;
            accordion.appendChild(accordionItem);
        });
    }

    // Bi-directional messaging
    window.addEventListener('message', (e) => {
        if (e.data.type === 'element-clicked') {
            const { builderId, sectionId } = e.data;

            // Open accordion
            const collapse = document.getElementById(`collapse-${sectionId}`);
            if (collapse) {
                const bsCollapse = new bootstrap.Collapse(collapse, { toggle: false });
                bsCollapse.show();

                // Scroll to field
                setTimeout(() => {
                    const field = document.querySelector(`[data-field-for="${builderId}"]`);
                    if (field) field.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        }
    });

    // Editor Actions
    window.focusElement = (id) => {
        const el = iframeDoc.querySelector(`[data-builder-id="${id}"]`);
        if (el) {
            iframeDoc.querySelectorAll('.editable-highlight').forEach(h => h.classList.remove('editable-highlight'));
            el.classList.add('editable-highlight');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    };

    window.updateContent = (id, val) => {
        const el = iframeDoc.querySelector(`[data-builder-id="${id}"]`);
        if (el) {
            // Preserve allowed children if present
            const allowedTags = ['I', 'ION-ICON', 'SPAN', 'B', 'STRONG', 'EM'];
            const children = Array.from(el.childNodes);

            // Find text nodes
            const textNodes = children.filter(node => node.nodeType === 3);

            if (children.some(node => node.nodeType === 1 && allowedTags.includes(node.tagName))) {
                // Has preserved elements (like icons)
                if (textNodes.length > 0) {
                    // Update the first text node that isn't just whitespace if possible
                    const contentNode = textNodes.find(n => n.nodeValue.trim().length > 0) || textNodes[0];
                    contentNode.nodeValue = val;
                } else {
                    // No text node? Add one
                    el.appendChild(document.createTextNode(val));
                }
            } else {
                // Simple element
                el.innerText = val;
            }
        }

        if (!webConfig[activeTemplateId]) webConfig[activeTemplateId] = {};
        if (!webConfig[activeTemplateId][id]) webConfig[activeTemplateId][id] = {};
        webConfig[activeTemplateId][id].text = val;
    };

    window.updateLink = (id, val) => {
        const el = iframeDoc.querySelector(`[data-builder-id="${id}"]`);
        if (el) el.href = val;

        if (!webConfig[activeTemplateId]) webConfig[activeTemplateId] = {};
        if (!webConfig[activeTemplateId][id]) webConfig[activeTemplateId][id] = {};
        webConfig[activeTemplateId][id].href = val;
    };

    window.updateSrc = (id, val) => {
        const el = iframeDoc.querySelector(`[data-builder-id="${id}"]`);
        if (el) el.src = val;

        if (!webConfig[activeTemplateId]) webConfig[activeTemplateId] = {};
        if (!webConfig[activeTemplateId][id]) webConfig[activeTemplateId][id] = {};
        webConfig[activeTemplateId][id].src = val;
    };

    window.triggerUpload = (id, type) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) handleFileUpload(file, id, type);
        };
        input.click();
    };

    window.handleDragOver = (e, zone) => {
        e.preventDefault();
        zone.classList.add('bg-primary', 'bg-opacity-10');
    };

    window.handleDragLeave = (e, zone) => {
        zone.classList.remove('bg-primary', 'bg-opacity-10');
    };

    window.handleDrop = (e, zone, id, type) => {
        e.preventDefault();
        zone.classList.remove('bg-primary', 'bg-opacity-10');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            handleFileUpload(file, id, type);
        }
    };

    async function handleFileUpload(file, id, type) {
        const zone = document.querySelector(`[data-field-for="${id}"] .upload-zone`);
        const originalHtml = zone.innerHTML;
        zone.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div><p class="small mb-0">Subiendo...</p>';

        try {
            const url = await uploadToCloudinary(file);
            if (!webConfig[activeTemplateId]) webConfig[activeTemplateId] = {};
            if (!webConfig[activeTemplateId][id]) webConfig[activeTemplateId][id] = {};

            const el = iframeDoc.querySelector(`[data-builder-id="${id}"]`);
            if (type === 'bg') {
                el.style.backgroundImage = `url('${url}')`;
                webConfig[activeTemplateId][id].bgImage = url;
            } else {
                el.src = url;
                webConfig[activeTemplateId][id].src = url;
            }

            zone.innerHTML = `
                <i class="bi bi-check-circle text-success"></i>
                <p class="mb-0 small">Actualizada</p>
                <img src="${url}" id="sidebar-preview-${id}" class="mt-2 rounded shadow-sm" style="max-width: 100%; max-height: 100px;">
            `;
        } catch (err) {
            alert("Error al subir: " + err.message);
            zone.innerHTML = originalHtml;
        }
    }

    async function uploadToCloudinary(file) {
        const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        formData.append('folder', `websites/${user.id}`);

        const response = await fetch(url, { method: 'POST', body: formData });
        if (!response.ok) throw new Error("Cloudinary upload failed");
        const data = await response.json();
        return data.secure_url;
    }

    function setupDeviceSwitcher() {
        document.querySelectorAll('.device-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const device = btn.getAttribute('data-device');
                const frame = document.getElementById('preview-frame');
                frame.className = `preview-${device}`;
            };
        });
    }

</script>
