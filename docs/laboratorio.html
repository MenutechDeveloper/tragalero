<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio | Tragalero</title>
    <link rel="icon" type="image/png" href="./assets/img/tragalero_negro.png">
    <script src="./assets/js/theme.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --success: #059669;
            --error: #dc2626;
            --nm-shadow-1: 20px 20px 60px #d9d6cc, -20px -20px 60px #ffffff;
            --nm-inner-shadow: inset 6px 6px 12px #d9d6cc, inset -6px -6px 12px #ffffff;
        }

        [data-bs-theme="dark"] {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
            --nm-shadow-1: 20px 20px 60px #0e1013, -20px -20px 60px #2a2e39;
            --nm-inner-shadow: inset 6px 6px 12px #0e1013, inset -6px -6px 12px #2a2e39;
        }

        [data-bs-theme="light"] {
            --orange: #eab308;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
        }

        [data-bs-theme="medio"] {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; margin-bottom: 60px; }
        .logo-main { width: 100%; max-width: 280px; height: auto; margin: 0 auto 10px auto; display: block; filter: drop-shadow(0 10px 20px rgba(255,149,51,0.15)); }

        .dashboard-layout { display: flex; min-height: calc(100vh - 160px); gap: 40px; }

        /* Sidebar Styles (Matching adminWeb.html) */
        .sidebar-container {
            position: fixed; left: 0; top: 120px; z-index: 6000; pointer-events: none; display: flex; align-items: flex-start;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar-container > * { pointer-events: auto; }
        .sidebar-container.collapsed { transform: translateX(-340px) !important; }

        .sidebar { width: 340px; height: 700px; display: flex; flex-direction: column; gap: 20px; }
        .nav-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 24px; position: relative; cursor: default; transition: opacity 0.3s; user-select: none; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.15); height: 100%; display: flex; flex-direction: column; }
        .nav-card label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin-bottom: 15px; margin-left: 5px; pointer-events: none; font-family: 'Plus Jakarta Sans'; }

        .nav-item { padding: 14px 18px; border-radius: 16px; background: var(--input); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; color: var(--text); }
        .nav-item:hover { border-color: var(--orange); }
        .nav-item.active { border-color: var(--orange); background: rgba(255,149,51,0.08); color: var(--orange); }
        .nav-item span { font-weight: 700; font-size: 0.85rem; }

        .sidebar-tab {
            width: 45px; height: 160px; background: var(--orange); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 0 16px 16px 0; cursor: pointer; writing-mode: vertical-lr; text-orientation: mixed; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; box-shadow: 10px 0 30px rgba(255, 149, 51, 0.2); transition: 0.4s; margin-top: 40px; position: relative;
        }
        .sidebar-tab:hover { width: 55px; padding-left: 10px; }

        .main-content { flex: 1; min-width: 0; padding-left: 60px; } /* Space for the tab */

        .lab-section { display: none; animation: slideUp 0.5s ease-out; }
        .lab-section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .section-header { margin-bottom: 30px; }
        .section-header h2 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--text); }

        /* QR Reader Styles */
        .qr-container { background: var(--card); border-radius: 36px; padding: 40px; border: 1.5px solid var(--border); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        #drop-area { border: 2px dashed var(--border); border-radius: 32px; padding: 80px 20px; cursor: pointer; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); background: var(--bg); }
        #drop-area:hover { border-color: var(--orange); background: rgba(255, 149, 51, 0.03); transform: scale(1.01); }
        #drop-area.highlight { border-color: var(--orange); background: rgba(255,149,51,0.05); }
        #drop-area p { font-family: 'Plus Jakarta Sans'; font-weight: 700; font-size: 1.1rem; color: var(--text); }

        #qr-result-box { margin-top: 30px; padding: 24px; border-radius: 20px; background: var(--input); border: 1px solid var(--border); display: none; word-break: break-all; }
        #qr-result-box.show { display: block; }
        #qr-result-box a { color: var(--orange); font-weight: 700; text-decoration: none; }

        /* Compiler Styles */
        .compiler-container { display: flex; flex-direction: column; gap: 24px; }
        .editor-box { position: relative; }
        textarea { width: 100%; height: 320px; padding: 24px; border-radius: 28px; border: 1.5px solid var(--border); background: var(--input); color: var(--text); font-family: 'Courier New', Courier, monospace; font-size: 15px; resize: vertical; outline: none; transition: all 0.3s; overflow: hidden; scrollbar-width: none; -ms-overflow-style: none; }
        textarea::-webkit-scrollbar { display: none; }
        textarea:focus { border-color: var(--orange); }

        .compiler-actions { display: flex; gap: 16px; }
        .btn-lab { padding: 14px 28px; border-radius: 18px; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; transition: 0.4s; border: none; letter-spacing: 1.5px; font-family: 'Outfit', sans-serif; }
        .btn-run { background: var(--orange); color: #fff; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); }
        .btn-run:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); filter: brightness(1.1); }
        .btn-clear { background: var(--input); color: var(--text); border: 1.5px solid var(--border); }
        .btn-clear:hover { background: var(--border); transform: translateY(-3px); }

        .preview-frame-container {
            width: 100%;
            height: 800px;
            border-radius: 40px;
            background: var(--bg);
            padding: 30px;
            box-shadow: var(--nm-shadow-1);
            display: flex;
            align-items: stretch;
            resize: both;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .preview-frame-container::-webkit-scrollbar { display: none; }
        iframe { width: 100%; border: none; border-radius: 24px; background: transparent; overflow: hidden; scrollbar-width: none; -ms-overflow-style: none; }
        iframe::-webkit-scrollbar { display: none; }

        /* Navigation Bar */
        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; text-decoration: none; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); }

        .theme-switch { width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .theme-switch svg { width: 24px; height: 24px; }
        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        [data-bs-theme="dark"] .sun-icon { display: none; }
        [data-bs-theme="dark"] .moon-icon { display: block; }

        .theme-switcher-bar {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 50px;
            padding: 4px 12px;
            display: flex;
        }
        [data-bs-theme="dark"] .theme-switcher-bar {
            background: rgba(255, 255, 255, 0.1);
        }
        .theme-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            padding: 8px;
            margin: 0 2px;
            cursor: pointer;
            transition: all 0.2s;
            color: inherit;
            opacity: 0.5;
            border-radius: 50%;
        }
        .theme-btn:hover {
            opacity: 1;
            background: rgba(0,0,0,0.05);
        }
        [data-bs-theme="dark"] .theme-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .theme-btn.active {
            opacity: 1;
            transform: scale(1.1);
            color: var(--orange);
        }

        .hidden { display: none !important; }

        @media (max-width: 992px) {
            .sidebar-container { position: relative; top: 0; left: 0; transform: none !important; margin-bottom: 30px; }
            .sidebar-tab { display: none; }
            .sidebar { width: 100%; height: auto; }
            .main-content { padding-left: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <div id="top-nav">
        <a href="admin.html" class="btn-panel-top">VOLVER AL PANEL</a>
        <div class="theme-switcher-bar">
            <button class="theme-btn" data-theme-value="light" title="Modo Amarillo"><i class="bi bi-sun-fill"></i></button>
            <button class="theme-btn" data-theme-value="dark" title="Modo Oscuro"><i class="bi bi-moon-stars-fill"></i></button>
            <button class="theme-btn" data-theme-value="medio" title="Modo Suave"><i class="bi bi-palette-fill"></i></button>
        </div>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </div>

    <div class="container" id="main-container">
        <header>
            <img src="./assets/img/tragalero_negro.png" class="logo-main" alt="Tragalero">
            <p style="font-weight: 800; color: var(--orange); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; font-family: 'Outfit';">Laboratorio de Pruebas</p>
        </header>

        <div class="dashboard-layout">
            <div class="sidebar-container collapsed" id="sidebar-container">
                <aside class="sidebar">
                    <div class="nav-card">
                        <label>LAB TOOLS</label>
                        <div class="nav-item active" onclick="showSection('qr-reader', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="7" y1="7" x2="7" y2="7"/><line x1="17" y1="7" x2="17" y2="7"/><line x1="17" y1="17" x2="17" y2="17"/><line x1="7" y1="17" x2="7" y2="17"/></svg>
                            <span>Lector QR</span>
                        </div>
                        <div class="nav-item" onclick="showSection('compiler', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                            <span>Compilador Código</span>
                        </div>
                    </div>
                </aside>
                <div class="sidebar-tab" id="sidebar-tab">LAB TOOLS</div>
            </div>

            <main class="main-content">
                <!-- QR READER SECTION -->
                <section id="qr-reader" class="lab-section active">
                    <div class="section-header">
                        <h2>Lector de Códigos QR</h2>
                    </div>
                    <div class="qr-container">
                        <div id="drop-area">
                            <p>Arrastra y suelta una imagen de código QR aquí</p>
                            <span style="font-size: 0.85rem; color: var(--text-dim); margin-top: 15px; display: block; font-weight: 500;">O haz clic para seleccionar un archivo</span>
                            <input type="file" id="qr-input" class="hidden" accept="image/*">
                        </div>
                        <div id="qr-result-box">
                            <p id="qr-result-text" style="font-weight: 700; color: var(--orange);"></p>
                        </div>
                    </div>
                </section>

                <!-- COMPILER SECTION -->
                <section id="compiler" class="lab-section">
                    <div class="section-header">
                        <h2>Compilador de Código</h2>
                    </div>
                    <div class="compiler-container">
                        <div class="editor-box">
                            <textarea id="code-editor" placeholder="Escribe o pega tu código HTML, CSS o JS aquí..."></textarea>
                        </div>
                        <div class="compiler-actions">
                            <button class="btn-lab btn-run" onclick="runCode()">Ejecutar Código</button>
                            <button class="btn-lab btn-clear" onclick="clearCode()">Limpiar</button>
                        </div>
                        <div style="margin-top: 20px;">
                            <div class="preview-frame-container">
                                <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" scrolling="no"></iframe>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/supabase_logic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // initTheme(); // Handled by theme.js
            initSidebar();

            // Access check
            const user = await getLoggedInUser();
            if (!user || user.role !== 'Admin') {
                window.location.href = './admin.html';
                return;
            }

            initQRReader();
        });

        function initSidebar() {
            const sidebarContainer = document.getElementById('sidebar-container');
            const sidebarTab = document.getElementById('sidebar-tab');
            if (sidebarTab && sidebarContainer) {
                sidebarTab.onclick = () => {
                    sidebarContainer.classList.toggle('collapsed');
                };
            }
        }

        function showSection(id, btn) {
            document.querySelectorAll('.lab-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // --- QR Reader Logic ---
        function initQRReader() {
            const dropArea = document.getElementById('drop-area');
            const qrInput = document.getElementById('qr-input');

            dropArea.onclick = () => qrInput.click();

            qrInput.onchange = (e) => {
                if (e.target.files.length) processQR(e.target.files[0]);
            };

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                }, false);
            });

            dropArea.addEventListener('dragover', () => dropArea.classList.add('highlight'));
            dropArea.addEventListener('dragleave', () => dropArea.classList.remove('highlight'));
            dropArea.addEventListener('drop', (e) => {
                dropArea.classList.remove('highlight');
                if (e.dataTransfer.files.length) processQR(e.dataTransfer.files[0]);
            });
        }

        function processQR(file) {
            const reader = new FileReader();
            reader.onload = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    const resBox = document.getElementById('qr-result-box');
                    const resText = document.getElementById('qr-result-text');
                    resBox.classList.add('show');

                    if (code) {
                        resText.textContent = 'Contenido: ';
                        if (isUrl(code.data)) {
                            const link = document.createElement('a');
                            link.href = code.data;
                            link.target = '_blank';
                            link.textContent = code.data;
                            resText.appendChild(link);
                        } else {
                            resText.appendChild(document.createTextNode(code.data));
                        }
                    } else {
                        resText.textContent = "No se detectó ningún código QR.";
                    }
                };
                img.src = reader.result;
            };
            reader.readAsDataURL(file);
        }

        function isUrl(string) {
            try { new URL(string); return true; } catch (_) { return false; }
        }

        // --- Compiler Logic ---
        function runCode() {
            const code = document.getElementById('code-editor').value;
            const iframe = document.getElementById('preview-frame');

            // Agregamos un estilo para forzar la desaparición de scrolls dentro del iframe
            const noScrollStyle = '<style>body::-webkit-scrollbar { display: none; } body { -ms-overflow-style: none; scrollbar-width: none; overflow: hidden !important; }</style>';

            // Usamos srcdoc que es más seguro y compatible con el sandbox del iframe
            iframe.srcdoc = code + noScrollStyle;
        }

        function clearCode() {
            document.getElementById('code-editor').value = '';
            const iframe = document.getElementById('preview-frame');
            iframe.srcdoc = '';
        }

    </script>
</body>
</html>
