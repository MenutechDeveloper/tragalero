<!-- ESTILOS DEL PERSONALIZADOR -->
<style>
    .config-card {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: white;
        border-radius: 25px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        max-width: 600px;
        margin: 20px auto;
        color: #1e293b;
    }
    .config-card h4 { font-weight: 700; margin-bottom: 1.5rem; }
    .form-group-custom { margin-bottom: 1rem; }
    .form-label-custom {
        display: block;
        font-weight: 600;
        font-size: 0.85rem;
        color: #475569;
        margin-bottom: 0.5rem;
    }
    .form-control-custom {
        width: 100%;
        border-radius: 12px;
        padding: 10px 15px;
        border: 2px solid #f1f5f9;
        font-size: 0.9rem;
        box-sizing: border-box;
    }
    .form-control-custom:focus {
        outline: none;
        border-color: #7c83fd;
        box-shadow: 0 0 0 4px rgba(124, 131, 253, 0.1);
    }
    .flex-row-custom { display: flex; gap: 15px; margin-bottom: 1rem; }
    .flex-col-custom { flex: 1; }
    .color-input-wrapper { display: flex; align-items: center; gap: 10px; }
    .input-color-custom {
        width: 45px;
        height: 45px;
        padding: 0;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
    .preview-container-custom {
        margin-top: 25px;
        padding: 20px;
        border-radius: 20px;
        background: #f1f5f9;
        text-align: center;
    }
    .preview-label-custom {
        font-size: 0.7rem;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        display: block;
    }
    .code-output-custom {
        margin-top: 20px;
        background: #1e293b;
        color: #e2e8f0;
        padding: 15px;
        border-radius: 12px;
        font-family: monospace;
        font-size: 0.8rem;
        white-space: pre-wrap;
        word-break: break-all;
    }
</style>

<!-- ESTRUCTURA DEL PERSONALIZADOR -->
<div class="config-card">
    <h4>Configuración de Botón</h4>

    <div class="flex-row-custom">
        <div class="flex-col-custom">
            <label class="form-label-custom">CUID (GloriaFood)</label>
            <input type="text" id="cuidInput" class="form-control-custom" placeholder="52230bb2-..." value="52230bb2-7d2d-4f11-9f93-010d211a2f48">
        </div>
        <div class="flex-col-custom">
            <label class="form-label-custom">RUID (GloriaFood)</label>
            <input type="text" id="ruidInput" class="form-control-custom" placeholder="010d211a-..." value="010d211a-2f48-401d-910d-211a2f48010d">
        </div>
    </div>

    <div class="flex-row-custom">
        <div class="flex-col-custom">
            <label class="form-label-custom">Fondo</label>
            <div class="color-input-wrapper">
                <input type="color" id="bgColor" class="input-color-custom" value="#f2a04a">
                <input type="text" id="bgText" class="form-control-custom" value="#F2A04A">
            </div>
        </div>
        <div class="flex-col-custom">
            <label class="form-label-custom">Texto</label>
            <div class="color-input-wrapper">
                <input type="color" id="textColor" class="input-color-custom" value="#ffffff">
                <input type="text" id="textText" class="form-control-custom" value="#FFFFFF">
            </div>
        </div>
    </div>

    <div class="preview-container-custom">
        <span class="preview-label-custom">Vista Previa</span>
        <div id="buttonPreview">
            <tragalero-orders id="customBtn" cuid="" ruid="" background="#f2a04a" color="#ffffff"></tragalero-orders>
        </div>
    </div>

    <div class="code-output-custom" id="generatedCode"></div>
</div>

<!-- SISTEMA DEL BOTÓN (Lógica del Componente) -->
<script>
    if (!customElements.get('tragalero-orders')) {
        class TragaleroActionBase extends HTMLElement {
            constructor(type) {
                super();
                this.attachShadow({ mode: 'open' });
                this.type = type;
            }
            connectedCallback() { this.render(); }
            static get observedAttributes() { return ['cuid', 'ruid', 'background', 'color', 'textcolor']; }
            attributeChangedCallback() { this.render(); }
            render() {
                const cuid = this.getAttribute('cuid') || '';
                const ruid = this.getAttribute('ruid') || '';
                const bg = this.getAttribute('background') || (this.type === 'orders' ? '#f2a04a' : '#2f4854');
                const color = this.getAttribute('color') || this.getAttribute('textcolor') || '#ffffff';
                const label = this.type === 'reservations' ? 'RESERVAR MESA' : 'ORDENAR AHORA';
                const icon = this.type === 'reservations' ? 'bi-calendar-event' : 'bi-bag-check';
                this.shadowRoot.innerHTML = `
                    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
                    <style>
                        .btn-glf {
                            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px;
                            border-radius: 16px; border: none; background: ${bg}; color: ${color};
                            font-family: inherit; font-weight: 700; font-size: 0.9rem; text-transform: uppercase;
                            cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-decoration: none;
                        }
                        .btn-glf:hover { transform: translateY(-2px); filter: brightness(1.1); }
                    </style>
                    <button class="btn-glf" data-glf-cuid="${cuid}" data-glf-ruid="${ruid}">
                         ${label}
                    </button>
                `;
            }
        }
        customElements.define('tragalero-orders', class extends TragaleroActionBase { constructor() { super('orders'); } });
    }
</script>

<!-- LÓGICA DE SINCRONIZACIÓN -->
<script>
    (function() {
        const cuidIn = document.getElementById('cuidInput');
        const ruidIn = document.getElementById('ruidInput');
        const bgCol = document.getElementById('bgColor');
        const bgTxt = document.getElementById('bgText');
        const txCol = document.getElementById('textColor');
        const txTxt = document.getElementById('textText');
        const btn = document.getElementById('customBtn');
        const code = document.getElementById('generatedCode');

        function update() {
            btn.setAttribute('cuid', cuidIn.value);
            btn.setAttribute('ruid', ruidIn.value);
            btn.setAttribute('background', bgCol.value);
            btn.setAttribute('color', txCol.value);

            code.textContent = `<tragalero-orders \n  cuid="${cuidIn.value}" \n  ruid="${ruidIn.value}" \n  background="${bgCol.value}" \n  color="${txCol.value}">\n</tragalero-orders>`;

            if (window.glfBindButtons) window.glfBindButtons();
        }

        [cuidIn, ruidIn].forEach(i => i.addEventListener('input', update));
        bgCol.addEventListener('input', (e) => { bgTxt.value = e.target.value.toUpperCase(); update(); });
        bgTxt.addEventListener('input', (e) => { bgCol.value = e.target.value; update(); });
        txCol.addEventListener('input', (e) => { txTxt.value = e.target.value.toUpperCase(); update(); });
        txTxt.addEventListener('input', (e) => { txCol.value = e.target.value; update(); });

        update();
    })();
</script>
