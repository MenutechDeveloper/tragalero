<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Console | Menutech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --error: #dc2626;
            --success: #059669;
            --dev: #8b5cf6;
            --gallery-btn: #efeaff;
            --gallery-text: #8b5cf6;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
            --gallery-btn: #2d2a45;
            --gallery-text: #a78bfa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 100% 0%, rgba(255, 149, 51, 0.08) 0%, transparent 40%), radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 40%); }

        #top-nav { position: fixed; top: 32px; left: 32px; right: 32px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        /* Premium User Pill */
        #user-display-pill {
            background: var(--card); backdrop-filter: blur(20px); padding: 10px 28px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); min-width: 200px; justify-content: flex-start;
        }
        #user-display-pill:hover { transform: translateY(-2px); border-color: var(--orange); box-shadow: 0 15px 45px rgba(255,149,51,0.1); }

        #user-display-pill.admin-glow {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fbf5b7 60%, #aa771c 80%, #bf953f 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.admin-glow #user-name, #user-display-pill.admin-glow #user-role-label { color: #3e2b14 !important; }

        #user-display-pill.dev-glow {
            background: linear-gradient(135deg, #70706F 0%, #E9E9E7 20%, #70706F 40%, #E9E9E7 60%, #70706F 80%, #E9E9E7 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.dev-glow #user-name, #user-display-pill.dev-glow #user-role-label { color: #1e293b !important; }

        #user-display-pill.owner-glow {
            background: #000;
            background-image: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%, rgba(255,255,255,0.1) 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.owner-glow #user-name, #user-display-pill.owner-glow #user-role-label { color: #fff !important; }

        #user-display-pill #user-name, #user-display-pill #user-role-label { color: var(--text); transition: color 0.3s; }

        @keyframes foil-shine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .pill-info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
        #user-name { font-weight: 800; font-size: 0.9rem; font-family: 'Outfit', sans-serif; text-align: left; }
        #user-role-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; opacity: 0.8; }

        .pill-menu { position: absolute; top: calc(100% + 12px); right: 0; background: var(--card) !important; border: 1px solid var(--border); border-radius: 24px; padding: 12px; min-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.1); opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000; animation: none !important; }
        #user-display-pill.active .pill-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .pill-menu-item { padding: 12px 18px; border-radius: 14px; font-size: 0.85rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .pill-menu-item:hover { background: rgba(255, 149, 51, 0.1); color: var(--orange); }
        .pill-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .theme-switch { width: 50px; height: 50px; background: var(--card); border: 1.5px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        .theme-switch svg { width: 24px; height: 24px; transition: 0.4s; }
        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        body.dark-mode .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: block; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 14px 32px; border-radius: 24px; font-size: 0.9rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 10px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 149, 51, 0.4); filter: brightness(1.05); }

        .container { max-width: 1240px; margin: 100px auto 60px; padding: 0 40px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 24px; color: var(--text-dim); }

        .user-list { display: flex; flex-direction: column; gap: 20px; }
        .user-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 36px; padding: 32px 48px; display: grid; grid-template-columns: 1.2fr 1.5fr 1fr auto; align-items: center; gap: 32px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .user-card:hover { border-color: var(--orange); transform: translateY(-4px); box-shadow: 0 25px 60px rgba(0,0,0,0.08); }

        .user-info { min-width: 0; }
        .user-info h3 { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-info .domain-label { font-size: 0.8rem; color: var(--orange); font-weight: 700; letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .controls { display: flex; flex-direction: column; gap: 12px; }
        .controls input { width: 100%; background: var(--input); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 20px; color: var(--text); font-size: 0.9rem; transition: 0.3s; font-weight: 500; }
        .controls input:focus { border-color: var(--orange); outline: none; background: #fff; box-shadow: 0 4px 15px rgba(255, 149, 51, 0.05); }

        .role-select { background: var(--input); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 20px; color: var(--text); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; }
        .role-select:focus { outline: none; border-color: var(--orange); }

        .actions { display: flex; gap: 14px; }
        .btn { padding: 16px 28px; border-radius: 18px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; letter-spacing: 1px; }
        .btn-save { background: var(--orange); color: #fff; box-shadow: 0 8px 20px rgba(255, 149, 51, 0.25); }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 149, 51, 0.35); filter: brightness(1.05); }

        .btn-access { background: var(--gallery-btn); color: var(--gallery-text); }
        .btn-access:hover { background: var(--gallery-text); color: #fff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.2); }

        #user-search { width: 100%; max-width: 440px; background: var(--card); border: 1.5px solid var(--border); border-radius: 18px; padding: 18px 28px; color: var(--text); font-size: 1rem; margin: 0 auto 48px; display: block; box-shadow: 0 12px 35px rgba(0,0,0,0.03); transition: 0.4s; }
        #user-search:focus { outline: none; border-color: var(--orange); box-shadow: 0 18px 45px rgba(255, 149, 51, 0.12); }

        .loader { width: 44px; height: 44px; border: 4px solid rgba(255, 149, 51, 0.1); border-top-color: var(--orange); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        #loading-container { padding: 80px 0; display: flex; justify-content: center; align-items: center; width: 100%; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        @media (max-width: 1100px) { .user-card { grid-template-columns: 1fr; text-align: center; gap: 24px; padding: 40px; } .actions { justify-content: center; } .user-info h3, .user-info .domain-label { white-space: normal; } }

        #toast-container { position: fixed; top: 32px; right: 32px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 340px; padding: 22px 28px; border-radius: 28px; background: #1c1f26; color: #fff; font-size: 0.95rem; font-weight: 600; box-shadow: 0 25px 60px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 14px; pointer-events: auto; animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <div id="no-access" class="hidden" style="text-align: center; padding: 140px 20px;">
        <h2 style="font-family: 'Outfit'; font-size: 2.4rem; color: var(--text-dim);">Access Denied</h2>
        <button onclick="location.href='index.html'" class="btn btn-save" style="margin-top: 40px">Back to Login</button>
    </div>

    <div id="top-nav" class="hidden">
        <div><button class="btn-panel-top" onclick="location.href='index.html'">PANEL</button></div>
        <div style="display: flex; align-items: center; gap: 24px;">
            <div class="theme-switch" id="theme-toggle">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
            <div id="user-display-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:22px; height:22px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <div class="pill-info">
                    <div id="user-name">&nbsp;</div>
                    <div id="user-role-label">&nbsp;</div>
                </div>
                <div class="pill-menu">
                    <a href="index.html" class="pill-menu-item">Home</a>
                    <div class="pill-menu-item danger" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="container">
            <div id="admin-tools" class="hidden">
                <div class="section-title" style="text-align: center;">All Users</div>
                <input type="text" id="user-search" placeholder="Search users or domains...">
                <div id="user-list" class="user-list"></div>
            </div>
            <div id="loading-container">
                <div id="loading" class="loader"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/supabase_logic.js"></script>
    <script>
        const sb = supabaseClient;
        let user = null, userRole = null;

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            checkAuth();
        });

        async function checkAuth() {
            const profile = await getLoggedInUser();
            if (!profile) { location.href = "index.html"; return; }

            userRole = profile.role;
            // Strict Admin Access as requested: "solo el usuario admin tiene acceso a este panel"
            const allowedRoles = ['Admin'];
            if (!allowedRoles.includes(userRole)) { document.getElementById('no-access').classList.remove('hidden'); }
            else {
                const pill = document.getElementById('user-display-pill');
                document.getElementById('user-name').textContent = profile.name;
                document.getElementById('user-role-label').textContent = profile.role;
                pill.classList.add('admin-glow');

                document.getElementById('app').classList.remove('hidden');
                document.getElementById('top-nav').classList.remove('hidden');

                document.getElementById('admin-tools').classList.remove('hidden');
                loadAllUsers();
            }
        }

        async function loadAllUsers() {
            const { data } = await sb.from('usuarios').select('*').order('role', { ascending: true });
            document.getElementById('loading-container').classList.add('hidden');
            renderList(data, 'user-list');
            document.getElementById('user-search').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = data.filter(u => (u.name||'').toLowerCase().includes(term) || (u.domain||'').toLowerCase().includes(term));
                renderList(filtered, 'user-list');
            };
        }

        function renderList(users, targetId) {
            const list = document.getElementById(targetId);
            list.innerHTML = (users || []).map(u => `
                <div class="user-card">
                    <div class="user-info">
                        <h3>${u.name || 'User'}</h3>
                        <div class="domain-label">${u.domain || ''}</div>
                    </div>
                    <div class="controls">
                        <input type="text" value="${u.name || ''}" id="user-${u.id}" placeholder="Name">
                        <input type="text" value="${u.domain || ''}" id="dom-${u.id}" placeholder="Domain">
                    </div>
                    <div class="controls">
                        <select id="role-${u.id}" class="role-select">
                            <option value="Admin" ${u.role === 'Admin' ? 'selected' : ''}>Admin</option>
                            <option value="Developer" ${u.role === 'Developer' ? 'selected' : ''}>Developer</option>
                            <option value="Owner" ${u.role === 'Owner' ? 'selected' : ''}>Owner</option>
                        </select>
                        <select id="mode-${u.id}" class="role-select" style="margin-top: 8px; border-color: var(--orange); opacity: 0.8;">
                            <option value="grid" ${u.gallery_type === 'grid' ? 'selected' : ''}>GRID</option>
                            <option value="slider" ${u.gallery_type === 'slider' ? 'selected' : ''}>SLIDER</option>
                            <option value="bento" ${u.gallery_type === 'bento' ? 'selected' : ''}>BENTO</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button class="btn btn-save" onclick="updateUser('${u.id}')">SAVE</button>
                        <button class="btn btn-access" onclick="manageGallery('${u.id}')">GALLERY</button>
                    </div>
                </div>`).join('');
        }

        window.updateUser = async (id) => {
            const u = document.getElementById(`user-${id}`).value;
            const d = document.getElementById(`dom-${id}`).value;
            const r = document.getElementById(`role-${id}`).value;
            const m = document.getElementById(`mode-${id}`).value;
            const { error } = await sb.from('usuarios').update({ name: u, domain: d, role: r, gallery_type: m }).eq('id', id);

            if (error) window.showToast(error.message, "error");
            else window.showToast("User updated successfully", "success");
        };

        window.manageGallery = (ownerId) => {
            sessionStorage.setItem('mt_edit_owner_id', ownerId);
            location.href = 'adminWeb.html';
        };

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle').onclick = () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); };
            const pill = document.getElementById('user-display-pill');
            pill.onclick = (e) => { e.stopPropagation(); pill.classList.toggle('active'); };
            document.addEventListener('click', () => pill.classList.remove('active'));
        }
        window.logout = async () => { await sb.auth.signOut(); location.href = "index.html"; };
    </script>
</body>
</html>
