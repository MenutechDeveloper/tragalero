<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Console | Tragalero</title>
    <link rel="icon" type="image/png" href="./assets/img/tragalero_negro.png">
    <script src="./assets/js/theme.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --error: #dc2626;
            --success: #059669;
            --dev: #8b5cf6;
        }

        [data-bs-theme="dark"] {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        [data-bs-theme="light"] {
            --orange: #eab308;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
        }

        [data-bs-theme="medio"] {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 100% 0%, rgba(255, 149, 51, 0.1) 0%, transparent 40%), radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 40%); }

        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        /* Premium User Pill */
        #user-display-pill {
            background: var(--card); backdrop-filter: blur(20px); padding: 8px 24px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); min-width: 220px; justify-content: flex-start;
        }
        #user-display-pill:hover { transform: translateY(-2px); border-color: var(--orange); box-shadow: 0 15px 45px rgba(255,149,51,0.15); }

        #user-display-pill.admin-glow {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fbf5b7 60%, #aa771c 80%, #bf953f 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.admin-glow #user-name, #user-display-pill.admin-glow #user-role-label { color: #3e2b14 !important; }

        #user-display-pill.dev-glow {
            background: linear-gradient(135deg, #70706F 0%, #E9E9E7 20%, #70706F 40%, #E9E9E7 60%, #70706F 80%, #E9E9E7 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.dev-glow #user-name, #user-display-pill.dev-glow #user-role-label { color: #1e293b !important; }

        #user-display-pill.owner-glow {
            background: #000;
            background-image: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%, rgba(255,255,255,0.1) 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.owner-glow #user-name, #user-display-pill.owner-glow #user-role-label { color: #fff !important; }

        #user-display-pill #user-name, #user-display-pill #user-role-label { color: var(--text); transition: color 0.3s; }

        @keyframes foil-shine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .pill-info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
        #user-name { font-weight: 800; font-size: 0.85rem; font-family: 'Outfit', sans-serif; text-align: left; }
        #user-role-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }

        .pill-menu { position: absolute; top: calc(100% + 12px); right: 0; background: var(--card) !important; border: 1px solid var(--border); border-radius: 24px; padding: 12px; min-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.2); opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000; animation: none !important; }
        #user-display-pill.active .pill-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .pill-menu-item { padding: 12px 18px; border-radius: 14px; font-size: 0.85rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .pill-menu-item:hover { background: rgba(255, 149, 51, 0.1); color: var(--orange); }
        .pill-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .theme-switch { width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .theme-switch svg { width: 24px; height: 24px; transition: 0.4s; }
        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        [data-bs-theme="dark"] .sun-icon { display: none; }
        [data-bs-theme="dark"] .moon-icon { display: block; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); }

        header { text-align: center; margin-bottom: 60px; padding-top: 120px; }
        .logo-main { width: 100%; max-width: 280px; height: auto; margin: 0 auto 10px auto; filter: drop-shadow(0 10px 20px rgba(255,149,51,0.15)); }

        .badge { padding: 6px 14px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: 1px solid transparent; }
        .badge-admin { background: linear-gradient(135deg, #bf953f, #fcf6ba); color: #3e2b14; }
        .badge-dev { background: linear-gradient(135deg, #70706F, #E9E9E7); color: #1e293b; }
        .badge-owner { background: #000; color: #fff; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 40px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.2rem; margin-bottom: 24px; color: var(--text-dim); display: flex; align-items: center; gap: 12px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .user-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 60px; }
        .user-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px 32px; display: grid; grid-template-columns: 1.5fr 1.5fr 1fr auto; align-items: center; gap: 24px; transition: 0.4s; margin-bottom: 8px; }
        .user-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
        .user-info h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }

        .controls { display: flex; flex-direction: column; gap: 8px; }
        .controls input, .controls select { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-size: 0.8rem; }
        .controls input:focus { border-color: var(--orange); outline: none; }

        .actions { display: flex; gap: 10px; }
        .btn { padding: 12px 18px; border-radius: 14px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; }
        .btn-save { background: var(--orange); color: #fff; box-shadow: 0 4px 12px rgba(255, 149, 51, 0.2); }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--error); }
        .btn-access { background: #f3f0ff; color: #8b5cf6; }
        .btn-access:hover { background: #8b5cf6; color: #fff; }

        .loader { width: 30px; height: 30px; border: 3px solid rgba(255, 149, 51, 0.1); border-top-color: var(--orange); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        @media (max-width: 768px) { .user-card { grid-template-columns: 1fr; gap: 16px; text-align: center; } .actions { justify-content: center !important; } }

        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 320px; max-width: 440px; padding: 18px 24px; border-radius: 24px; background: #1c1f26; border: 1px solid var(--border); color: #fff; font-size: 0.9rem; font-weight: 500; box-shadow: 0 12px 32px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1), toastFadeOut 0.5s 5.5s forwards; line-height: 1.4; }
        .toast.success { border-left: 6px solid var(--success); }
        .toast.error { border-left: 6px solid var(--error); }
        .toast.warning { border-left: 6px solid var(--orange); }
        @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastFadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <!-- Access Denied View -->
    <div id="no-access" class="hidden" style="text-align: center; padding: 100px;">
        <h2 style="font-family: 'Outfit'; font-size: 2rem; margin-bottom: 12px;">Access Denied</h2>
        <button onclick="location.href='index.html'" class="btn-panel-top" style="margin-top: 30px">Back to Home</button>
    </div>

    <!-- Main Navigation -->
    <style>
        .theme-switcher-bar {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 50px;
            padding: 4px 12px;
            display: flex;
        }
        [data-bs-theme="dark"] .theme-switcher-bar {
            background: rgba(255, 255, 255, 0.1);
        }
        .theme-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            padding: 8px;
            margin: 0 2px;
            cursor: pointer;
            transition: all 0.2s;
            color: inherit;
            opacity: 0.5;
            border-radius: 50%;
        }
        .theme-btn:hover {
            opacity: 1;
            background: rgba(0,0,0,0.05);
        }
        [data-bs-theme="dark"] .theme-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .theme-btn.active {
            opacity: 1;
            transform: scale(1.1);
            color: var(--orange);
        }
    </style>

    <!-- Main Navigation -->
    <div id="top-nav" class="hidden">
        <div><button class="btn-panel-top" onclick="location.href='admin.html'">PANEL</button></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-switcher-bar">
                <button class="theme-btn" data-theme-value="light" title="Modo Amarillo"><i class="bi bi-sun-fill"></i></button>
                <button class="theme-btn" data-theme-value="dark" title="Modo Oscuro"><i class="bi bi-moon-stars-fill"></i></button>
                <button class="theme-btn" data-theme-value="medio" title="Modo Suave"><i class="bi bi-palette-fill"></i></button>
            </div>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
            <div id="user-display-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px; height:20px; color: inherit;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <div class="pill-info">
                    <div id="user-name">&nbsp;</div>
                    <div id="user-role-label">&nbsp;</div>
                </div>
                <div class="pill-menu">
                    <a href="index.html" class="pill-menu-item">Home</a>
                    <div class="pill-menu-item danger" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Container -->
    <div id="app" class="hidden">
        <header><img src="./assets/img/tragalero_negro.png" class="logo-main" alt="Tragalero Logo"></header>
        <div class="container">
            <div id="admin-tools" class="hidden">
                <div class="section-title">All Users</div>
                <div style="margin-bottom: 40px;"><input type="text" id="user-search" placeholder="Search users or domains..." style="width: 100%; max-width: 420px; background: var(--input); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px 24px; color: var(--text); font-size: 0.85rem; box-shadow: 0 4px 20px rgba(0,0,0,0.02); transition: 0.3s;"></div>
                <div id="user-list" class="user-list"></div>
            </div>
            <div id="dev-tools" class="hidden">
                <div class="section-title">Assigned Projects</div>
                <div id="assigned-list" class="user-list"></div>
            </div>
            <div id="loading" class="loader"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/supabase_logic.js"></script>
    <script>
        const sb = supabaseClient;
        let currentUser = null;

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div>${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 6000);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // initTheme(); // Handled by theme.js
                initEvents();
                checkAuth();
            } catch(e) { console.error("Init error:", e); }
        });

        async function checkAuth() {
            try {
                const profile = await getLoggedInUser();
                if (!profile) {
                    location.href = "index.html";
                    return;
                }

                currentUser = profile;
                const userRole = (profile.role || '').toLowerCase();
                const isAdmin = userRole === 'admin';
                const isStaff = ['admin', 'developer', 'design', 'cs', 'sales', 'support', 'retention'].includes(userRole);

                if (userRole !== 'admin' && !isStaff) {
                    document.getElementById('no-access').classList.remove('hidden');
                    const loader = document.getElementById('loading');
                    if (loader) loader.classList.add('hidden');
                    return;
                }

                const pill = document.getElementById('user-display-pill');
                const uName = document.getElementById('user-name');
                const uRole = document.getElementById('user-role-label');
                const app = document.getElementById('app');
                const nav = document.getElementById('top-nav');

                if (uName) uName.textContent = profile.name || profile.email;
                if (uRole) uRole.textContent = profile.role;

                if (pill) {
                    pill.classList.remove('admin-glow', 'dev-glow', 'owner-glow');
                    if (userRole === 'admin') pill.classList.add('admin-glow');
                    else if (userRole === 'developer') pill.classList.add('dev-glow');
                    else pill.classList.add('owner-glow');
                }

                if (app) app.classList.remove('hidden');
                if (nav) nav.classList.remove('hidden');

                if (userRole === 'admin') {
                    const tools = document.getElementById('admin-tools');
                    if (tools) tools.classList.remove('hidden');
                    loadAllUsers();
                } else {
                    const tools = document.getElementById('dev-tools');
                    if (tools) tools.classList.remove('hidden');
                    loadAssignedOwners();
                }
            } catch (e) {
                console.error("Auth error:", e);
                location.href = "index.html";
            }
        }

        async function loadAllUsers() {
            try {
                const { data, error } = await sb.from('usuarios').select('*').order('role', { ascending: true });
                const loading = document.getElementById('loading');
                if (loading) loading.classList.add('hidden');
                if (error) throw error;

                renderList(data, 'user-list', true);
                const search = document.getElementById('user-search');
                if (search) {
                    search.oninput = (e) => {
                        const term = e.target.value.toLowerCase();
                        const filtered = data.filter(u => (u.name||'').toLowerCase().includes(term) || (u.domain||'').toLowerCase().includes(term));
                        renderList(filtered, 'user-list', true);
                    };
                }
            } catch (e) { console.error(e); }
        }

        async function loadAssignedOwners() {
            try {
                const { data } = await sb.from('usuarios').select('*').neq('role', 'Admin');
                const loading = document.getElementById('loading');
                if (loading) loading.classList.add('hidden');
                renderList(data, 'assigned-list', false);
            } catch(e) { console.error(e); }
        }

        function renderList(users, targetId, isAdminView) {
            const list = document.getElementById(targetId);
            if (!list) return;
            list.innerHTML = (users || []).map(u => {
                const roleLower = (u.role || '').toLowerCase();
                let badgeClass = 'badge-owner';
                if (roleLower === 'admin') badgeClass = 'badge-admin';
                else if (roleLower === 'developer') badgeClass = 'badge-dev';

                return `
                <div class="user-card" style="border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255, 149, 51, 0.1);">
                    <div class="user-info">
                        <h3 style="font-family: 'Outfit'; font-weight: 700;">${u.name || 'No Name'}</h3>
                        ${u.domain ? `<div style="font-size: 0.7rem; color: var(--orange); font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;">${u.domain}</div>` : '<div style="font-size: 0.7rem; color: var(--text-dim);">NO DOMAIN</div>'}
                    </div>
                    <div class="controls">
                        <div style="font-size: 0.6rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; margin-left: 5px;">User Info</div>
                        <input type="text" value="${u.name || ''}" id="user-${u.id}" ${!isAdminView ? 'disabled' : ''} placeholder="Name" style="margin-bottom: 8px; border-radius: 14px; font-weight: 600;">
                        <input type="text" value="${u.domain || ''}" id="dom-${u.id}" ${!isAdminView ? 'disabled' : ''} placeholder="Domain" style="border-radius: 14px; font-weight: 600;">
                    </div>
                    <div class="badge-container">
                        <div style="font-size: 0.6rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; margin-left: 5px;">Access Role</div>
                        ${isAdminView ? `
                            <select id="role-${u.id}" style="width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; color: var(--text); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; cursor: pointer;">
                                <option value="Admin" ${u.role === 'Admin' ? 'selected' : ''}>Admin</option>
                                <option value="Developer" ${u.role === 'Developer' ? 'selected' : ''}>Developer</option>
                                <option value="Owner" ${u.role === 'Owner' ? 'selected' : ''}>Owner</option>
                                <option value="Design" ${u.role === 'Design' ? 'selected' : ''}>Design</option>
                                <option value="CS" ${u.role === 'CS' ? 'selected' : ''}>CS</option>
                                <option value="Sales" ${u.role === 'Sales' ? 'selected' : ''}>Sales</option>
                                <option value="Support" ${u.role === 'Support' ? 'selected' : ''}>Support</option>
                                <option value="Retention" ${u.role === 'Retention' ? 'selected' : ''}>Retention</option>
                            </select>
                        ` : `<span class="badge ${badgeClass}" style="display: inline-block; width: 100%; text-align: center; padding: 12px; border-radius: 14px;">${u.role}</span>`}
                    </div>
                    <div class="actions">
                        <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
                            <button class="btn btn-access" onclick="manageGallery('${u.id}')" style="width: 100%; border-radius: 16px; background: rgba(255, 149, 51, 0.1); color: var(--orange); border: 1.5px solid rgba(255, 149, 51, 0.2);">GALLERY</button>
                            ${isAdminView ? `
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn btn-save" onclick="updateUser('${u.id}')" style="flex: 1; border-radius: 16px; font-weight: 800;">SAVE</button>
                                    <button class="btn btn-del" onclick="deleteUser('${u.id}')" style="border-radius: 16px; padding: 12px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg></button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>`}).join('');
        }

        window.updateUser = async (id) => {
            const u = document.getElementById(`user-${id}`).value;
            const d = document.getElementById(`dom-${id}`).value;
            const r = document.getElementById(`role-${id}`).value;
            const { error } = await sb.from('usuarios').update({ name: u, domain: d, role: r }).eq('id', id);

            if (error) {
                window.showToast(error.message, "error");
            } else {
                window.showToast("User updated successfully", "success");
            }
        };

        window.manageGallery = (ownerId) => {
            sessionStorage.setItem('mt_edit_owner_id', ownerId);
            location.href = 'adminWeb.html';
        };

        window.deleteUser = async (id) => {
            if (!confirm("¿ESTÁS SEGURO? Esta acción eliminará permanentemente al usuario y todos sus datos (galería, promos, negocios).")) return;

            const { error } = await sb.from('usuarios').delete().eq('id', id);
            if (error) {
                window.showToast(error.message, "error");
            } else {
                window.showToast("Usuario eliminado", "success");
                loadAllUsers();
            }
        };

        function initEvents() {
            const pill = document.getElementById('user-display-pill');
            if (pill) pill.onclick = (e) => { e.stopPropagation(); pill.classList.toggle('active'); };
            document.addEventListener('click', () => { if (pill) pill.classList.remove('active'); });
        }

        window.logout = async () => {
            await sb.auth.signOut();
            location.href = "index.html";
        };
    </script>
</body>
</html>
